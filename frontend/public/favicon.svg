<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <clipPath id="round"><rect width="32" height="32" rx="7"/></clipPath>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="21" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#001538"/>
      <stop offset="1" stop-color="#06245f"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="20" x2="0" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a3cff"/>
      <stop offset="1" stop-color="#0026ff"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#round)">
    <rect width="32" height="32" fill="url(#sky)"/>
    <!-- sun -->
    <circle cx="22.5" cy="8.5" r="3" fill="#4ec2e2"/>
    <!-- far ridge -->
    <path d="M0 20.5 L7 11 L13 16 L19 8 L26 15 L32 10 L32 20.5 Z" fill="#1c3a6e"/>
    <!-- near snowy peaks -->
    <path d="M0 21 L6 14 L10 18 L16 10 L21 17 L27 13 L32 18 L32 21 Z" fill="#c3e9ee"/>
    <!-- water -->
    <rect y="20.5" width="32" height="12" fill="url(#water)"/>
    <!-- shimmer -->
    <rect x="4" y="24" width="9" height="1.2" rx="0.6" fill="#7fb4ff" opacity="0.6"/>
    <rect x="17" y="27" width="11" height="1.2" rx="0.6" fill="#7fb4ff" opacity="0.5"/>
  </g>
</svg>
